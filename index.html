<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truecaller Global Pro - Smart Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .premium-gradient { background: linear-gradient(135deg, #0046ad 0%, #0082fb 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .data-label { font-size: 0.7rem; font-weight: bold; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .data-value { font-size: 1rem; font-weight: 600; color: #1e293b; }
        .identifying-text { animation: pulse 1.5s infinite; color: #3b82f6; font-weight: 900; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 p-2 rounded-xl text-white"><i class="fa-solid fa-phone"></i></div>
            <span class="text-xl font-black text-blue-900 tracking-tighter uppercase">Truecaller <span class="text-blue-500">Intel</span></span>
        </div>
        <button id="loginBtn" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-blue-700 transition">Login</button>
    </nav>

    <header class="premium-gradient py-16 px-6 text-center text-white">
        <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tight">SMART CALLER ID</h1>
        <p class="text-blue-100 mb-10 max-w-xl mx-auto font-light">Firebase এবং Truecaller SDK-এর সমন্বয়ে হাইব্রিড ডাটা সার্চ।</p>
        
        <div class="max-w-2xl mx-auto flex bg-white rounded-2xl shadow-2xl p-2 overflow-hidden ring-4 ring-blue-400/20">
            <input type="text" id="searchInput" placeholder="Enter number (e.g. 017...)" class="w-full p-4 text-gray-800 outline-none font-bold text-lg" />
            <button id="searchBtn" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-black hover:bg-blue-700 transition active:scale-95">SEARCH</button>
        </div>

        <div id="resultArea" class="max-w-lg mx-auto mt-12 hidden text-left">
            <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl border-t-[10px] border-blue-600">
                <div class="mb-8">
                    <p class="data-label mb-1">Identified Name</p>
                    <h2 id="displayTitle" class="text-3xl font-black text-slate-900 uppercase">Identifying...</h2>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="data-label"><i class="fa-solid fa-location-dot"></i> Location</p>
                        <p id="resLocation" class="data-value">--</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="data-label"><i class="fa-solid fa-signal"></i> Carrier</p>
                        <p id="resCarrier" class="data-value">--</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="data-label"><i class="fa-solid fa-globe"></i> Country</p>
                        <p id="resCountry" class="data-value">--</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="data-label"><i class="fa-solid fa-shield"></i> Status</p>
                        <p id="resStatus" class="data-value">--</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <footer class="mt-20 py-8 text-center text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em]">
        © 2026 MD DULAL HOSAN | Hybrid Intelligence System
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyzEWR2Bct6EkSBQTLCvkHi4Vzb7oasy4",
            authDomain: "truecaller-98603.firebaseapp.com",
            projectId: "truecaller-98603",
            storageBucket: "truecaller-98603.firebasestorage.app",
            messagingSenderId: "594765579227",
            appId: "1:594765579227:web:13db05082163fc3c371dfe",
            databaseURL: "https://truecaller-98603-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const APP_KEY = "9GNiG9e3d5a5077274b74ae147fb52e2ae190";

        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const resultArea = document.getElementById('resultArea');
        const displayTitle = document.getElementById('displayTitle');

        searchBtn.addEventListener('click', async () => {
            let num = searchInput.value.trim().replace(/\s/g, '');
            if (!num) return alert("Please enter a number");

            let apiNum = num.startsWith('0') ? '88' + num : num;

            resultArea.classList.remove('hidden');
            displayTitle.innerText = "IDENTIFYING...";
            displayTitle.classList.add('identifying-text');
            resetFields();

            try {
                // ১. Firebase ডাটাবেস চেক
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `numbers/${num}`));
                let foundName = snapshot.exists() ? snapshot.val().name : null;

                // ২. এপিআই কল
                const res = await fetch(`https://phoneintelligence.abstractapi.com/v1?api_key=${APP_KEY}&phone=${apiNum}`);
                const data = await res.json();
                
                displayTitle.classList.remove('identifying-text');

                if (foundName) {
                    displayTitle.innerText = foundName;
                } else if (data.phone_number) {
                    displayTitle.innerText = data.phone_carrier.name + " USER";
                } else {
                    displayTitle.innerText = "CALLER FOUND (NO NAME)";
                }

                if (data.phone_number) {
                    document.getElementById('resLocation').innerText = data.phone_location.city || "BANGLADESH";
                    document.getElementById('resCountry').innerText = data.phone_location.country_name || "BANGLADESH";
                    document.getElementById('resCarrier').innerText = data.phone_carrier.name || "OPERATOR";
                    document.getElementById('resStatus').innerText = data.phone_validation.line_status.toUpperCase();
                }

            } catch (e) {
                displayTitle.innerText = "UNKNOWN CALLER";
                displayTitle.classList.remove('identifying-text');
            }
        });

        function resetFields() {
            document.getElementById('resLocation').innerText = "--";
            document.getElementById('resCountry').innerText = "--";
            document.getElementById('resCarrier').innerText = "--";
            document.getElementById('resStatus').innerText = "--";
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(res => {
                document.getElementById('loginBtn').innerText = res.user.displayName;
            });
        });
    </script>
</body>
</html>
