<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Truecaller Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>📞 Number Search Pro</h1>

<input id="number" placeholder="Enter phone number">
<button onclick="searchNumber()">Search</button>

<div id="result"></div>

<hr>

<h3>⚠ Report Number</h3>

<input id="rnumber" placeholder="Number">
<select id="rtype">
<option>Spam</option>
<option>Fraud</option>
<option>Marketing</option>
<option>Scam</option>
</select>

<textarea id="rcomment" placeholder="Comment"></textarea>

<button onclick="reportNumber()">Submit Report</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
