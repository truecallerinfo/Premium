<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truecaller Intelligent Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .premium-gradient { background: linear-gradient(135deg, #0046ad 0%, #0082fb 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .data-label { font-size: 0.7rem; font-weight: bold; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .data-value { font-size: 1rem; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 p-2 rounded-xl text-white"><i class="fa-solid fa-phone"></i></div>
            <span class="text-xl font-black text-blue-900 tracking-tighter">TRUECALLER <span class="text-blue-500">INTEL</span></span>
        </div>
        <button id="loginBtn" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-blue-700 transition">Login</button>
    </nav>

    <header class="premium-gradient py-12 px-6 text-center text-white">
        <h1 class="text-3xl md:text-5xl font-bold mb-4">Smart Caller ID</h1>
        <p class="text-blue-100 mb-8 max-w-xl mx-auto">ডাটাবেস এবং এপিআই-এর সমন্বয়ে নির্ভুল তথ্য।</p>
        
        <div class="max-w-2xl mx-auto flex bg-white rounded-2xl shadow-2xl p-2 overflow-hidden">
            <input type="text" id="searchInput" placeholder="Enter number (e.g. 88017...)" class="w-full p-4 text-gray-800 outline-none font-medium" />
            <button id="searchBtn" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition">Search</button>
        </div>

        <div id="resultArea" class="max-w-lg mx-auto mt-8 hidden text-left">
            <div class="glass-card p-6 rounded-3xl shadow-2xl border-t-8 border-blue-500">
                <div class="mb-6">
                    <p class="data-label">Identified Name</p>
                    <h2 id="displayTitle" class="text-2xl font-black text-slate-900">Identifying...</h2>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-white/50 rounded-xl">
                        <p class="data-label"><i class="fa-solid fa-location-dot"></i> Location</p>
                        <p id="resLocation" class="data-value text-sm">--</p>
                    </div>
                    <div class="p-3 bg-white/50 rounded-xl">
                        <p class="data-label"><i class="fa-solid fa-signal"></i> Carrier</p>
                        <p id="resCarrier" class="data-value text-sm">--</p>
                    </div>
                    <div class="p-3 bg-white/50 rounded-xl">
                        <p class="data-label"><i class="fa-solid fa-globe"></i> Country</p>
                        <p id="resCountry" class="data-value text-sm">--</p>
                    </div>
                    <div class="p-3 bg-white/50 rounded-xl">
                        <p class="data-label"><i class="fa-solid fa-shield"></i> Status</p>
                        <p id="resStatus" class="data-value text-sm">--</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyzEWR2Bct6EkSBQTLCvkHi4Vzb7oasy4",
            authDomain: "truecaller-98603.firebaseapp.com",
            projectId: "truecaller-98603",
            storageBucket: "truecaller-98603.firebasestorage.app",
            messagingSenderId: "594765579227",
            appId: "1:594765579227:web:13db05082163fc3c371dfe",
            databaseURL: "https://truecaller-98603-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const API_KEY = "830c25a589574221976a21306f477022"; 

        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        const resultArea = document.getElementById('resultArea');
        const displayTitle = document.getElementById('displayTitle');

        searchBtn.addEventListener('click', async () => {
            // নম্বর ক্লিনআপ (প্লাস এবং স্পেস সরানো)
            let number = searchInput.value.trim().replace(/\+/g, '').replace(/\s/g, '');
            if (!number) return alert("Please enter a number");

            resultArea.classList.remove('hidden');
            displayTitle.innerText = "Searching...";
            resetFields();

            try {
                // ১. Firebase থেকে নাম খোঁজা
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `numbers/${number}`));
                
                if (snapshot.exists()) {
                    displayTitle.innerText = snapshot.val().name;
                } else {
                    displayTitle.innerText = "Unknown Caller";
                }

                // ২. এপিআই থেকে লোকেশন/অপারেটর তথ্য আনা
                const apiRes = await fetch(`https://phoneintelligence.abstractapi.com/v1?api_key=${API_KEY}&phone=${number}`);
                const data = await apiRes.json();

                if(data.phone_number) {
                    document.getElementById('resLocation').innerText = data.phone_location.city || "Not Found";
                    document.getElementById('resCountry').innerText = data.phone_location.country_name || "N/A";
                    document.getElementById('resCarrier').innerText = data.phone_carrier.name || "N/A";
                    document.getElementById('resStatus').innerText = data.phone_validation.line_status.toUpperCase();
                } else {
                    alert("এপিআই এই নম্বরের তথ্য খুঁজে পায়নি।");
                }
            } catch (e) {
                displayTitle.innerText = "Error Searching";
                console.error(e);
            }
        });

        function resetFields() {
            document.getElementById('resLocation').innerText = "--";
            document.getElementById('resCountry').innerText = "--";
            document.getElementById('resCarrier').innerText = "--";
            document.getElementById('resStatus').innerText = "--";
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then((r) => {
                document.getElementById('loginBtn').innerText = r.user.displayName;
            });
        });
    </script>
</body>
</html>
